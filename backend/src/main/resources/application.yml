server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/studentdb
    username: student
    password: student
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
  security:
    oauth2:
      resourceserver:
        jwt:
          # Keycloak realm issuer. Must match the "iss" claim in tokens the browser receives.
          issuer-uri: http://localhost:8081/realms/student-realm

camunda:
  bpm:
    # Local Cockpit/Tasklist login (separate from app users): admin / admin
    admin-user:
      id: admin
      password: admin
      first-name: Camunda
    filter:
      create: All tasks
    database:
      schema-update: true
    auto-deployment-enabled: true

logging:
  level:
    org.springframework.security: INFO